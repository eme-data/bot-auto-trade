<div class="card-body">
    <h6 class="card-title text-muted mb-3">
        <i class="bi bi-robot me-1"></i>Statut Bot
    </h6>
    <div class="mb-2">
        {% if halted %}
        <span class="badge bg-danger fs-6">HALTED</span>
        {% elif running %}
        <span class="badge bg-success fs-6">RUNNING</span>
        {% else %}
        <span class="badge bg-warning text-dark fs-6">PAUSED</span>
        {% endif %}

        {% if dry_run %}
        <span class="badge bg-warning text-dark ms-1">DRY RUN</span>
        {% else %}
        <span class="badge bg-primary ms-1">LIVE</span>
        {% endif %}
    </div>

    <div class="small mt-3">
        <div class="d-flex justify-content-between py-1">
            <span class="text-muted">Strategies</span>
            <span>
                {% for s in strategies %}
                <span class="badge bg-secondary">{{ s }}</span>
                {% endfor %}
            </span>
        </div>
        <div class="d-flex justify-content-between py-1">
            <span class="text-muted">Paires</span>
            <span>
                {% for p in pairs %}
                <span class="badge bg-secondary">{{ p }}</span>
                {% endfor %}
            </span>
        </div>
    </div>
</div>
