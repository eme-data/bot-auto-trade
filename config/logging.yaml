version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
  file:
    class: logging.handlers.RotatingFileHandler
    filename: data/logs/bot.log
    maxBytes: 10485760
    backupCount: 5
    formatter: standard
    level: DEBUG
root:
  level: DEBUG
  handlers: [console, file]
